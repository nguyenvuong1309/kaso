# Recommended Codex CLI config for the Kaso project.
# Copy or merge this file into ~/.codex/config.toml.
# Or run `bash .codex/install.sh` for automatic installation.

# === Model ===
# gpt-5-codex is the default for coding tasks. If you have o3/o3-mini access, swap here.
model = "gpt-5-codex"
model_reasoning_effort = "high"          # "minimal" | "low" | "medium" | "high"
model_reasoning_summary = "auto"         # auto / detailed / none

# === Sandbox & approval ===
# workspace-write: Codex can edit files in cwd and does not touch outside.
# on-failure: ask the user only when a command fails (for example: needs network outside sandbox).
sandbox_mode = "workspace-write"
approval_policy = "on-failure"

# === Hide reasoning from output to keep it concise (optional) ===
hide_agent_reasoning = false

# === History ===
[history]
persistence = "save-all"                 # save-all | none
max_bytes = 10_000_000

# === Shell environment policy ===
# Inherit env from the user's shell (DEVELOPER_DIR, PATH, ...) — required for xcodebuild
[shell_environment_policy]
inherit = "all"
ignore_default_excludes = false
exclude = ["AWS_*", "AZURE_*", "*_TOKEN", "*_SECRET", "*_KEY"]

# === Project profile ===
# Activate with: codex --profile kaso
[profiles.kaso]
model = "gpt-5-codex"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-failure"

# Allow network in the sandbox for this profile (needed for swift package resolve)
[profiles.kaso.sandbox_workspace_write]
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false
writable_roots = [
    "~/Library/Developer/Xcode/DerivedData",
    "~/Library/Caches/org.swift.swiftpm",
    "~/.cache/clang",
    "/tmp",
]

# === MCP servers (optional) ===
# Enable when needed. Comment out if the MCP server is not installed.

# Filesystem MCP — controlled read/write outside cwd
# [mcp_servers.filesystem]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/vuongnguyen/dev3/kaso"]

# GitHub MCP — query issues/PRs
# [mcp_servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# env = { GITHUB_PERSONAL_ACCESS_TOKEN = "set-via-keychain" }

# Apple Doc MCP — search Apple developer documentation
# [mcp_servers.appledoc]
# command = "uvx"
# args = ["mcp-server-apple-doc"]

# === TUI customization ===
[tui]
# Theme can be: dark, light, auto
# theme = "dark"

# === Notification on completion (macOS) ===
notify = ["osascript", "-e", "display notification \"Codex done\" with title \"Kaso\""]

# === Workspace trust (optional) ===
# Mark the Kaso project as trusted to skip the prompt each time
# [projects."/Users/vuongnguyen/dev3/kaso"]
# trust_level = "trusted"
